name: Build

on:
  push:
    branches: ['**']
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # ── Gate: validation checks run once before any builds ──────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate feature key synchronization
        run: uv run python scripts/check_feature_key_sync.py

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-platformio-

      - name: Static checks (cppcheck)
        run: uv run pio check -e default

      - name: Run host tests
        run: bash test/run_host_tests.sh

  # ── Build: 3 profiles in parallel ──────────────────────────────
  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - profile: lean
            version_suffix: "-lean"
          - profile: standard
            version_suffix: ""
          - profile: full
            version_suffix: "-full"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Check for reusable build artifact
        id: reuse
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: firmware-${{ matrix.profile }}
        run: python3 scripts/ci/check_reusable_artifact.py

      - name: Download reused artifact
        if: steps.reuse.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE_URL: ${{ steps.reuse.outputs.archive_url }}
          OUTPUT_DIR: artifact
        run: python3 scripts/ci/download_artifact.py

      - name: Setup Python
        if: steps.reuse.outputs.found != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        if: steps.reuse.outputs.found != 'true'
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        if: steps.reuse.outputs.found != 'true'
        run: uv sync --frozen

      - name: Cache PlatformIO
        if: steps.reuse.outputs.found != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-platformio-

      - name: Generate build configuration
        if: steps.reuse.outputs.found != 'true'
        run: |
          uv run python scripts/generate_build_config.py --profile "${{ matrix.profile }}"
          cat platformio-custom.ini

      - name: Patch version string
        if: steps.reuse.outputs.found != 'true'
        run: |
          sed -i 's/-custom\\"/${{ matrix.version_suffix }}\\"/g' platformio-custom.ini
          grep CROSSPOINT_VERSION platformio-custom.ini

      - name: Build firmware
        if: steps.reuse.outputs.found != 'true'
        run: |
          set -o pipefail
          uv run pio run -e custom | tee pio.log

      - name: Enforce flash headroom
        if: steps.reuse.outputs.found != 'true'
        run: |
          uv run python scripts/check_flash_headroom.py \
            --log pio.log \
            --firmware .pio/build/custom/firmware.bin \
            --min-headroom-kb 64

      - name: Extract firmware stats
        if: steps.reuse.outputs.found != 'true'
        run: |
          set -euo pipefail
          ram_line="$(grep -E "RAM:\\s" -m1 pio.log || true)"
          flash_line="$(grep -E "Flash:\\s" -m1 pio.log || true)"
          if [ -z "$ram_line" ]; then echo "::warning::RAM usage not found in build log — PlatformIO output format may have changed"; fi
          if [ -z "$flash_line" ]; then echo "::warning::Flash usage not found in build log — PlatformIO output format may have changed"; fi
          {
            echo "### Firmware Stats (${{ matrix.profile }})"
            echo ""
            if [ -n "$ram_line" ]; then echo "- ${ram_line}"; else echo "- RAM: not found"; fi
            if [ -n "$flash_line" ]; then echo "- ${flash_line}"; else echo "- Flash: not found"; fi
            echo "- Flash headroom threshold: 64 KiB"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report firmware size
        if: steps.reuse.outputs.found != 'true'
        run: |
          echo "### Firmware Size (${{ matrix.profile }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh .pio/build/custom/firmware.bin >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Prepare artifact
        if: steps.reuse.outputs.found != 'true'
        run: |
          mkdir -p artifact
          # name_firmware_artifact.py (post: extra_script) writes the versioned
          # binary to the top-level firmware/ dir, not .pio/build/custom/.
          cp firmware/firmware-*.bin artifact/
          cp .pio/build/custom/partitions.bin artifact/

      - name: Report reused build
        if: steps.reuse.outputs.found == 'true'
        run: |
          {
            echo "### Firmware (${{ matrix.profile }}) — reused"
            echo ""
            echo "Reused artifact from run [#${{ steps.reuse.outputs.source_run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ steps.reuse.outputs.source_run_id }})."
            echo ""
            echo '```'
            ls -lh artifact/
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.profile }}
          path: artifact/
          retention-days: 7

  # ── Build (latest channel): gh_latest env, any branch push ─────
  build-latest:
    needs: validate
    if: >-
      github.event_name == 'push'
      && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0  # full history needed for accurate commit count

      - name: Compute commit count and version
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          COUNT=$((COUNT > 99999 ? 99999 : COUNT))
          echo "version=${COUNT}-dev" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT_COUNT=${COUNT}" >> $GITHUB_ENV

      - name: Check for reusable build artifact
        id: reuse
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: firmware-latest
        run: python3 scripts/ci/check_reusable_artifact.py

      - name: Download reused artifact
        if: steps.reuse.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE_URL: ${{ steps.reuse.outputs.archive_url }}
          OUTPUT_DIR: .pio/build/gh_latest
        run: python3 scripts/ci/download_artifact.py

      - name: Setup Python
        if: steps.reuse.outputs.found != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        if: steps.reuse.outputs.found != 'true'
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        if: steps.reuse.outputs.found != 'true'
        run: uv sync --frozen

      - name: Cache PlatformIO
        if: steps.reuse.outputs.found != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-platformio-

      - name: Build firmware (gh_latest)
        if: steps.reuse.outputs.found != 'true'
        run: |
          set -o pipefail
          uv run pio run -e gh_latest | tee pio.log

      - name: Enforce flash headroom
        if: steps.reuse.outputs.found != 'true'
        run: |
          uv run python scripts/check_flash_headroom.py \
            --log pio.log \
            --firmware .pio/build/gh_latest/firmware.bin \
            --min-headroom-kb 64

      - name: Extract latest firmware stats
        if: steps.reuse.outputs.found != 'true'
        run: |
          set -euo pipefail
          ram_line="$(grep -E "RAM:\\s" -m1 pio.log || true)"
          flash_line="$(grep -E "Flash:\\s" -m1 pio.log || true)"
          if [ -z "$ram_line" ]; then echo "::warning::RAM usage not found in build log — PlatformIO output format may have changed"; fi
          if [ -z "$flash_line" ]; then echo "::warning::Flash usage not found in build log — PlatformIO output format may have changed"; fi
          {
            echo "### Firmware Stats (gh_latest)"
            echo ""
            if [ -n "$ram_line" ]; then echo "- ${ram_line}"; else echo "- RAM: not found"; fi
            if [ -n "$flash_line" ]; then echo "- ${flash_line}"; else echo "- Flash: not found"; fi
            echo "- Flash headroom threshold: 64 KiB"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report reused build
        if: steps.reuse.outputs.found == 'true'
        run: |
          {
            echo "### Firmware (gh_latest) — reused"
            echo ""
            echo "Reused artifact from run [#${{ steps.reuse.outputs.source_run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ steps.reuse.outputs.source_run_id }})."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload latest firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-latest
          path: |
            .pio/build/gh_latest/firmware-*.bin
            .pio/build/gh_latest/partitions.bin
          retention-days: 7

  # ── Publish: update rolling latest channel (5 variants + shared partitions) on any branch push ─
  publish-latest:
    needs: [build, build-latest]
    if: >-
      github.event_name == 'push'
      && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download latest standard firmware
        uses: actions/download-artifact@v8
        with:
          name: firmware-latest
          path: artifacts/latest-standard

      - name: Download lean firmware
        uses: actions/download-artifact@v8
        with:
          name: firmware-lean
          path: artifacts/lean

      - name: Download full firmware
        uses: actions/download-artifact@v8
        with:
          name: firmware-full
          path: artifacts/full

      - name: Prepare latest channel assets
        run: |
          set -euo pipefail
          mkdir -p channel
          standard_firmware="$(find artifacts/latest-standard -name 'firmware-*.bin' -type f | sort | tail -n1)"
          lean_firmware="$(find artifacts/lean -name 'firmware-*.bin' -type f | sort | tail -n1)"
          full_firmware="$(find artifacts/full -name 'firmware-*.bin' -type f | sort | tail -n1)"
          cp "$standard_firmware" "channel/$(basename "$standard_firmware")"
          cp "$standard_firmware" channel/crosspoint-standard.bin
          cp artifacts/latest-standard/partitions.bin channel/crosspoint-partitions.bin
          cp "$lean_firmware" channel/crosspoint-lean.bin
          cp "$full_firmware" channel/crosspoint-full.bin
          cp "$lean_firmware" channel/crosspoint-lean-reset.bin
          cp "$full_firmware" channel/crosspoint-full-reset.bin
          ls -lh channel

      - name: Remove existing latest assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_ids="$(gh api repos/${{ github.repository }}/releases/tags/latest \
            --jq '.assets[] | .id' \
            2>/dev/null || true)"
          if [ -z "$asset_ids" ]; then
            echo "No existing latest assets to remove."
            exit 0
          fi
          for asset_id in $asset_ids; do
            gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}" || true
          done

      - name: Publish latest channel release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ${{ needs.build-latest.outputs.version }}
          prerelease: true
          draft: false
          generate_release_notes: false
          files: channel/*.bin

  # ── Release: versioned release + rolling channel on tag push ────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        id: version
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"  # strip leading 'v' for the rolling release channel name
          echo "ver=${VER}" >> $GITHUB_OUTPUT

          standard_firmware="$(find artifacts/firmware-standard -name 'firmware-*.bin' -type f | sort | tail -n1)"
          lean_firmware="$(find artifacts/firmware-lean -name 'firmware-*.bin' -type f | sort | tail -n1)"
          full_firmware="$(find artifacts/firmware-full -name 'firmware-*.bin' -type f | sort | tail -n1)"

          # Standard firmware (default names)
          cp "$standard_firmware" "$(basename "$standard_firmware")"
          cp artifacts/firmware-standard/partitions.bin partitions.bin
          cp "$standard_firmware" "crosspoint-${TAG}.bin"
          cp partitions.bin "crosspoint-${TAG}-partitions.bin"

          # Lean firmware
          cp "$lean_firmware" "crosspoint-${TAG}-lean.bin"

          # Lean reset firmware (same payload as lean, separate distribution target)
          cp "$lean_firmware" "crosspoint-${TAG}-lean-reset.bin"

          # Full firmware
          cp "$full_firmware" "crosspoint-${TAG}-full.bin"

          # Full reset firmware (same payload as full, separate distribution target)
          cp "$full_firmware" "crosspoint-${TAG}-full-reset.bin"

          # Stable channel rolling assets (tag: stable)
          cp "$standard_firmware" crosspoint-standard.bin
          cp partitions.bin crosspoint-partitions.bin
          cp "$lean_firmware" crosspoint-lean.bin
          cp "$full_firmware" crosspoint-full.bin
          cp "$lean_firmware" crosspoint-lean-reset.bin
          cp "$full_firmware" crosspoint-full-reset.bin

          echo "Release assets:"
          ls -lh *.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware-*.bin
            partitions.bin
            crosspoint-${{ github.ref_name }}.bin
            crosspoint-${{ github.ref_name }}-partitions.bin
            crosspoint-${{ github.ref_name }}-lean.bin
            crosspoint-${{ github.ref_name }}-full.bin
            crosspoint-${{ github.ref_name }}-lean-reset.bin
            crosspoint-${{ github.ref_name }}-full-reset.bin
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Remove existing stable channel assets
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_ids="$(gh api repos/${{ github.repository }}/releases/tags/stable \
            --jq '.assets[] | .id' \
            2>/dev/null || true)"
          if [ -z "$asset_ids" ]; then
            echo "No existing stable channel assets to remove."
            exit 0
          fi
          for asset_id in $asset_ids; do
            gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}" || true
          done

      - name: Remove existing latest assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_ids="$(gh api repos/${{ github.repository }}/releases/tags/latest \
            --jq '.assets[] | .id' \
            2>/dev/null || true)"
          if [ -z "$asset_ids" ]; then
            echo "No existing latest assets to remove."
            exit 0
          fi
          for asset_id in $asset_ids; do
            gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}" || true
          done

      # Every tag push advances latest — 'stable' only moves on clean version tags.
      - name: Update latest channel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ${{ steps.version.outputs.ver }}
          prerelease: true
          draft: false
          generate_release_notes: false
          make_latest: false
          files: |
            firmware-*.bin
            crosspoint-standard.bin
            crosspoint-partitions.bin
            crosspoint-lean.bin
            crosspoint-full.bin
            crosspoint-lean-reset.bin
            crosspoint-full-reset.bin

      - name: Publish stable channel
        if: ${{ !contains(github.ref_name, '-') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          name: ${{ steps.version.outputs.ver }}
          prerelease: false
          draft: false
          generate_release_notes: false
          files: |
            firmware-*.bin
            crosspoint-standard.bin
            crosspoint-partitions.bin
            crosspoint-lean.bin
            crosspoint-full.bin
            crosspoint-lean-reset.bin
            crosspoint-full-reset.bin
