<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrossPoint Reader - Pokemon Party</title>
  <style>
    :root {
      /* THEME_TOKENS_START */
      /* THEME_TOKENS_END */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-mono);
      max-width: 900px;
      margin: 0 auto;
      background-color: var(--gray-10);
      color: var(--black);
      background-image: radial-gradient(circle, var(--gray-8) 1px, transparent 1px);
      background-size: 4px 4px;
      padding-bottom: 20px;
    }

    .nav {
      display: flex;
      border-bottom: 2px solid var(--black);
      background: var(--white);
    }

    .nav a {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      text-decoration: none;
      color: var(--black);
      font-size: 0.8em;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-right: 1px solid var(--gray-8);
    }

    .nav a:last-child { border-right: none; }
    .nav a:hover, .nav a.active { background: var(--black); color: var(--white); }

    .card {
      background: var(--white);
      border: 2px solid var(--black);
      margin: 12px 16px;
      padding: 16px;
    }

    h1 {
      font-family: var(--font-display);
      margin-bottom: 6px;
      font-size: 1.8em;
    }

    .subtitle {
      color: var(--gray-4);
      font-size: 0.9em;
      line-height: 1.45;
    }

    .status {
      padding: 10px;
      border: 1px solid var(--gray-8);
      background: var(--gray-10);
      font-size: 0.82em;
      min-height: 40px;
      margin-top: 12px;
    }

    .party-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .party-slot {
      border: 2px solid var(--black);
      background: var(--white);
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .slot-label {
      font-size: 0.78em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .party-book {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      align-items: start;
    }

    .party-cover {
      width: 72px;
      aspect-ratio: 3 / 4;
      border: 2px solid var(--black);
      background: var(--gray-10);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 0.72em;
      padding: 6px;
    }

    .party-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .party-meta {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .party-book-title {
      font-size: 0.9em;
      font-weight: 700;
      line-height: 1.25;
      word-break: break-word;
    }

    .party-book-author,
    .party-book-path,
    .party-assigned-line,
    .party-empty {
      font-size: 0.76em;
      color: var(--gray-4);
      line-height: 1.35;
      word-break: break-word;
    }

    .party-pokemon-name {
      font-size: 0.82em;
      font-weight: 700;
      line-height: 1.3;
    }

    .assign-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .pokemon-picker {
      position: relative;
      flex: 1 1 180px;
      min-width: 0;
    }

    .pokemon-picker input {
      width: 100%;
      min-width: 0;
      padding: 8px;
      border: 2px solid var(--black);
      font-family: var(--font-mono);
      font-size: 0.9em;
      background: var(--white);
    }

    .pokemon-picker-results {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      border: 2px solid var(--black);
      background: var(--white);
      max-height: 220px;
      overflow-y: auto;
      z-index: 10;
    }

    .pokemon-picker-results.is-open {
      display: block;
    }

    .pokemon-picker-option,
    .pokemon-picker-empty {
      display: block;
      width: 100%;
      padding: 8px 10px;
      border: 0;
      border-bottom: 1px solid var(--gray-8);
      background: var(--white);
      color: var(--black);
      text-align: left;
      font-family: var(--font-mono);
      font-size: 0.76em;
      line-height: 1.35;
    }

    .pokemon-picker-option {
      cursor: pointer;
    }

    .pokemon-picker-option:hover,
    .pokemon-picker-option.is-active {
      background: var(--black);
      color: var(--white);
    }

    .pokemon-picker-option:last-child,
    .pokemon-picker-empty:last-child {
      border-bottom: 0;
    }

    .pokemon-picker-option-name {
      font-weight: 700;
    }

    .pokemon-picker-option-meta,
    .pokemon-picker-empty {
      color: var(--gray-4);
    }

    .pokemon-picker-option:hover .pokemon-picker-option-meta,
    .pokemon-picker-option.is-active .pokemon-picker-option-meta {
      color: var(--white);
    }

    .btn {
      border: 2px solid var(--black);
      background: var(--black);
      color: var(--white);
      padding: 10px 12px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.8em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .btn:hover {
      background: var(--white);
      color: var(--black);
    }

    .btn.secondary {
      background: var(--gray-2);
      border-color: var(--gray-2);
    }

    .btn.secondary:hover {
      color: var(--gray-2);
      background: var(--white);
    }

    .btn:disabled {
      background: var(--gray-6);
      border-color: var(--gray-6);
      color: var(--white);
      cursor: not-allowed;
    }

    .party-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .party-actions .btn {
      flex: 1 1 120px;
    }

    @media (max-width: 640px) {
      .party-book {
        grid-template-columns: 60px 1fr;
      }

      .party-cover {
        width: 60px;
      }
    }
  </style>
</head>

  function setStatus(message, isError) {
    statusBox.textContent = message;
    statusBox.style.borderColor = isError ? "#000" : "#ddd";
    statusBox.style.background = isError ? "#fff" : "#f5f5f5";
  }

  function titleCase(value) {
    return String(value)
      .replace(/-/g, " ")
      .replace(/\b\w/g, function(ch) { return ch.toUpperCase(); });
  }

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function extractResourceId(url) {
    const match = String(url || "").match(/\/(\d+)\/?$/);
    return match ? parseInt(match[1], 10) : null;
  }

  function normalizeSearchTerm(value) {
    return String(value || "")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "");
  }

  function buildPokemonCatalog() {
    const catalog = POKEMON_NAMES.map(function(name, index) {
      return {
        id: index + 1,
        name: name,
        displayName: titleCase(name),
        label: "#" + (index + 1) + " " + titleCase(name),
        searchKey: normalizeSearchTerm(name),
        searchTokens: String(name).split(/[^a-z0-9]+/i).filter(Boolean).map(normalizeSearchTerm)
      };
    });

    Object.keys(POKEMON_CACHE || {}).forEach(function(key) {
      if (!/\/api\/v2\/pokemon\/\d+\/?$/.test(key)) {
        return;
      }
      const data = POKEMON_CACHE[key];
      if (!data || typeof data.id !== "number" || !data.name || data.id < 1 || data.id > catalog.length) {
        return;
      }
      catalog[data.id - 1] = {
        id: data.id,
        name: data.name,
        displayName: titleCase(data.name),
        label: "#" + data.id + " " + titleCase(data.name),
        searchKey: normalizeSearchTerm(data.name),
        searchTokens: String(data.name).split(/[^a-z0-9]+/i).filter(Boolean).map(normalizeSearchTerm)
      };
    });

    return catalog;
  }

  function computeSubsequenceGap(query, target) {
    let targetIndex = 0;
    let gap = 0;
    for (let queryIndex = 0; queryIndex < query.length; queryIndex++) {
      const nextIndex = target.indexOf(query[queryIndex], targetIndex);
      if (nextIndex === -1) {
        return Infinity;
      }
      gap += nextIndex - targetIndex;
      targetIndex = nextIndex + 1;
    }
    gap += target.length - targetIndex;
    return gap;
  }

  async function fetchJson(url) {
    if (POKEMON_CACHE[url] !== undefined) {
      return POKEMON_CACHE[url];
    }
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error("Request failed: " + response.status);
    }
    return await response.json();
  }

  function getSpriteUrl(pokemon, style) {
    if (style === "pixel") return pokemon.sprites && pokemon.sprites.front_default;
    if (style === "home") return pokemon.sprites && pokemon.sprites.other && pokemon.sprites.other.home && pokemon.sprites.other.home.front_default;
    return pokemon.sprites && pokemon.sprites.other && pokemon.sprites.other["official-artwork"] && pokemon.sprites.other["official-artwork"].front_default;
  }

  function getEvolutionText(details) {
    if (!details) return null;
    if (details.min_level) return "Lvl " + details.min_level;
    if (details.item && details.item.name) return titleCase(details.item.name);
    if (details.trigger && details.trigger.name === "trade") {
      if (details.held_item && details.held_item.name) return "Trade w/ " + titleCase(details.held_item.name);
      return "Trade";
    }
    if (details.min_happiness) {
      let label = "Friendship";
      if (details.time_of_day) label += " (" + titleCase(details.time_of_day) + ")";
      return label;
    }
    if (details.location && details.location.name) return "Loc: " + titleCase(details.location.name);
    if (details.known_move && details.known_move.name) return "Move: " + titleCase(details.known_move.name);
    if (details.trigger && details.trigger.name && details.trigger.name !== "level-up") return titleCase(details.trigger.name);
    return "Special";
  }

  function getLinearEvolutionStages(evolutionData) {
    if (!evolutionData || !evolutionData.chain) return [];
    const forms = [];
    let current = evolutionData.chain;

    while (current && forms.length < 3) {
      forms.push({
        name: current.species && current.species.name,
        url: current.species && current.species.url,
        details: forms.length === 0 ? null : (current.evolution_details && current.evolution_details[0]) || null
      });
      current = current.evolves_to && current.evolves_to.length ? current.evolves_to[0] : null;
    }

    return forms.filter(function(form) { return form && form.name && form.url; });
  }

  function buildPokemonAssignmentPayload(bundle) {
    const pokemon = bundle && bundle.pokemon;
    if (!pokemon) {
      throw new Error("Pokemon data missing");
    }

    const species = bundle.species || null;
    return {
      id: pokemon.id,
      name: pokemon.name || "",
      speciesId: (species && species.id) || extractResourceId(species && species.url),
      speciesName: (species && species.name) || (pokemon.name || ""),
      types: (pokemon.types || []).map(function(entry) {
        return entry && entry.type && entry.type.name;
      }).filter(Boolean),
      sprites: {
        pixel: getSpriteUrl(pokemon, "pixel") || "",
        official: getSpriteUrl(pokemon, "official") || "",
        home: getSpriteUrl(pokemon, "home") || ""
      },
      evolutionChain: getLinearEvolutionStages(bundle.evolution).map(function(stage, index) {
        return {
          order: index + 1,
          speciesId: extractResourceId(stage.url),
          name: stage.name || "",
          minLevel: stage.details && typeof stage.details.min_level === "number" ? stage.details.min_level : null,
          trigger: stage.details && stage.details.trigger && stage.details.trigger.name || null,
          text: index === 0 ? null : getEvolutionText(stage.details)
        };
      }),
      assignedAt: new Date().toISOString()
    };
  }

  function buildFallbackPokemonAssignment(entry) {
    return {
      id: entry.id,
      name: entry.name,
      speciesId: entry.id,
      speciesName: entry.name,
      types: [],
      sprites: {
        pixel: "",
        official: "",
        home: ""
      },
      evolutionChain: [],
      assignedAt: new Date().toISOString()
    };
  }

  const pokemonCatalog = buildPokemonCatalog();
  const pokemonCatalogById = new Map(pokemonCatalog.map(function(entry) { return [entry.id, entry]; }));
  const pokemonCatalogByName = new Map(pokemonCatalog.map(function(entry) { return [entry.searchKey, entry]; }));

  function lookupPokemonName(id, fallbackName) {
    if (typeof id === "number" && pokemonCatalogById.has(id)) {
      return pokemonCatalogById.get(id).displayName;
    }
    if (fallbackName) {
      return titleCase(fallbackName);
    }
    return "";
  }

  function syncButtons() {
    Array.from(document.querySelectorAll("button[data-book-path]")).forEach(function(button) {
      button.disabled = busy;
    });
    Array.from(document.querySelectorAll("input[data-assign-input]")).forEach(function(input) {
      input.disabled = busy;
    });
    if (busy) {
      closeAllPickerResults();
    }
  }

  async function fetchAssignedPokemon(path) {
    const response = await fetch("/api/book-pokemon?path=" + encodeURIComponent(path));
    if (response.status === 404) {
      return null;
    }
    if (!response.ok) {
      throw new Error(await response.text());
    }
    return await response.json();
  }

  function getBookByPath(path) {
    return partyBooks.find(function(book) { return book && book.path === path; }) || null;
  }

  function getPokemonEntryById(id) {
    return typeof id === "number" ? pokemonCatalogById.get(id) || null : null;
  }

  function parsePokemonId(value) {
    const match = String(value || "").trim().match(/^#?\s*(\d{1,4})(?:\s|$)/);
    if (!match) {
      return null;
    }
    const numericId = parseInt(match[1], 10);
    if (!Number.isFinite(numericId) || numericId < 1 || numericId > MAX_POKEMON_ID) {
      return null;
    }
    return numericId;
  }

  function scorePokemonMatch(entry, rawQuery, normalizedQuery) {
    if (!entry || !normalizedQuery) {
      return -1;
    }

    const parsedId = parsePokemonId(rawQuery);
    if (parsedId && entry.id === parsedId) {
      return 100000 - entry.id;
    }
    if (entry.searchKey === normalizedQuery) {
      return 90000 - entry.id;
    }
    if (entry.searchKey.indexOf(normalizedQuery) === 0) {
      return 80000 - entry.id;
    }
    for (let i = 0; i < entry.searchTokens.length; i++) {
      if (entry.searchTokens[i].indexOf(normalizedQuery) === 0) {
        return 70000 - (i * 100) - entry.id;
      }
    }
    const containsIndex = entry.searchKey.indexOf(normalizedQuery);
    if (containsIndex !== -1) {
      return 60000 - (containsIndex * 10) - entry.id;
    }
    const subsequenceGap = computeSubsequenceGap(normalizedQuery, entry.searchKey);
    if (Number.isFinite(subsequenceGap)) {
      return 40000 - (subsequenceGap * 10) - entry.id;
    }
    return -1;
  }

  function getPokemonMatches(rawQuery, limit) {
    const trimmedQuery = String(rawQuery || "").trim();
    if (!trimmedQuery) {
      return [];
    }

    const parsedId = parsePokemonId(trimmedQuery);
    if (parsedId) {
      const entry = getPokemonEntryById(parsedId);
      return entry ? [entry] : [];
    }

    const normalizedQuery = normalizeSearchTerm(trimmedQuery);
    if (!normalizedQuery) {
      return [];
    }

    return pokemonCatalog
      .map(function(entry) {
        return { entry: entry, score: scorePokemonMatch(entry, trimmedQuery, normalizedQuery) };
      })
      .filter(function(result) { return result.score >= 0; })
      .sort(function(lhs, rhs) {
        if (rhs.score !== lhs.score) {
          return rhs.score - lhs.score;
        }
        return lhs.entry.id - rhs.entry.id;
      })
      .slice(0, limit)
      .map(function(result) { return result.entry; });
  }

  function isExactPokemonQuery(rawQuery, entry) {
    if (!entry) {
      return false;
    }
    const trimmedQuery = String(rawQuery || "").trim();
    if (!trimmedQuery) {
      return false;
    }
    const parsedId = parsePokemonId(trimmedQuery);
    if (parsedId) {
      return parsedId === entry.id;
    }
    const normalizedQuery = normalizeSearchTerm(trimmedQuery);
    return normalizedQuery === entry.searchKey || normalizedQuery === normalizeSearchTerm(entry.label);
  }

  function getPickerResultsBox(encodedPath) {
    return partyGrid.querySelector('[data-picker-results][data-book-path="' + encodedPath + '"]');
  }

  function closePickerResults(encodedPath) {
    const resultsBox = getPickerResultsBox(encodedPath);
    if (!resultsBox) {
      return;
    }
    resultsBox.innerHTML = "";
    resultsBox.classList.remove("is-open");
  }

  function closeAllPickerResults() {
    Array.from(partyGrid.querySelectorAll("[data-picker-results]")).forEach(function(resultsBox) {
      resultsBox.innerHTML = "";
      resultsBox.classList.remove("is-open");
    });
  }

  function setPickerInputValue(input, entry) {
    input.value = entry.label;
    input.dataset.selectedPokemonId = String(entry.id);
  }

  function renderPickerResults(input) {
    const encodedPath = input.getAttribute("data-book-path") || "";
    const resultsBox = getPickerResultsBox(encodedPath);
    if (!resultsBox || busy) {
      return;
    }

    const rawQuery = String(input.value || "").trim();
    if (!rawQuery) {
      closePickerResults(encodedPath);
      return;
    }

    const matches = getPokemonMatches(rawQuery, 8);
    if (!matches.length) {
      resultsBox.innerHTML = '<div class="pokemon-picker-empty">No Pokemon match.</div>';
      resultsBox.classList.add("is-open");
      return;
    }

    resultsBox.innerHTML = matches.map(function(entry, index) {
      return [
        '<button class="pokemon-picker-option' + (index === 0 ? ' is-active' : '') + '" type="button" data-party-action="pick-pokemon" data-book-path="' + encodedPath + '" data-pokemon-id="' + entry.id + '">',
        '  <div class="pokemon-picker-option-name">' + escapeHtml(entry.label) + '</div>',
        '  <div class="pokemon-picker-option-meta">' + escapeHtml(entry.name) + '</div>',
        '</button>'
      ].join("");
    }).join("");
    resultsBox.classList.add("is-open");
  }

  function resolvePokemonSelection(input) {
    const rawQuery = String(input && input.value || "").trim();
    if (!rawQuery) {
      throw new Error("Search for a Pokemon before confirming.");
    }

    const selectedId = parseInt(input.dataset.selectedPokemonId || "", 10);
    if (Number.isFinite(selectedId)) {
      const selectedEntry = getPokemonEntryById(selectedId);
      if (selectedEntry && input.value === selectedEntry.label) {
        return selectedEntry;
      }
    }

    const parsedId = parsePokemonId(rawQuery);
    if (parsedId) {
      const idMatch = getPokemonEntryById(parsedId);
      if (idMatch) {
        return idMatch;
      }
    }

    const normalizedQuery = normalizeSearchTerm(rawQuery);
    if (normalizedQuery && pokemonCatalogByName.has(normalizedQuery)) {
      return pokemonCatalogByName.get(normalizedQuery);
    }

    const matches = getPokemonMatches(rawQuery, 8);
    if (!matches.length) {
      throw new Error("No Pokemon matched that search.");
    }
    if (matches.length > 1 && !isExactPokemonQuery(rawQuery, matches[0])) {
      throw new Error("Choose a Pokemon from the search results before confirming.");
    }
    return matches[0];
  }

  function renderParty() {
    if (!partyBooks.length) {
      partyGrid.innerHTML = "";
      setStatus("No recent books yet. Open a few books first and the first 6 will become the party.", false);
      return;
    }

    partyGrid.innerHTML = partyBooks.map(function(book, index) {
      const title = escapeHtml(book.title || "Untitled");
      const author = book.author ? escapeHtml(book.author) : "";
      const path = escapeHtml(book.path || "");
      const encodedPath = encodeURIComponent(book.path || "");
      const assigned = book.pokemon || null;
      const assignedId = assigned && typeof assigned.id === "number" ? assigned.id : "";
      const assignedName = assigned ? lookupPokemonName(assigned.id, assigned.name) : "";
      const assignedEntry = assignedId ? getPokemonEntryById(assignedId) : null;
      const inputValue = assignedEntry
        ? assignedEntry.label
        : (assignedId && assignedName ? "#" + assignedId + " " + assignedName : "");
      const assignedText = assigned
        ? '<div class="party-pokemon-name">#' + assignedId + (assignedName ? " " + escapeHtml(assignedName) : "") + '</div>'
        : '<div class="party-empty">No Pokemon assigned yet.</div>';

      return [
        '<div class="party-slot">',
        '  <div class="slot-label">Slot ' + (index + 1) + '</div>',
        '  <div class="party-book">',
        '    <div class="party-cover">',
               book.hasCover
                 ? '<img src="/api/cover?path=' + encodeURIComponent(book.path) + '" alt="' + title + '" loading="lazy">'
                 : '<span>Book</span>',
        '    </div>',
        '    <div class="party-meta">',
        '      <div class="party-book-title">' + title + '</div>',
               author ? '      <div class="party-book-author">' + author + '</div>' : '',
        '      <div class="party-book-path">' + path + '</div>',
        '      <div class="party-assigned-line">Assigned Pokemon</div>',
         '      ' + assignedText,
         '    </div>',
         '  </div>',
         '  <div class="assign-row">',
         '    <div class="pokemon-picker">',
         '      <input type="text" data-assign-input="1" data-book-path="' + encodedPath + '" data-selected-pokemon-id="' + (assignedId || "") + '" value="' + escapeHtml(inputValue) + '" placeholder="Search Pokemon by name or #id" autocomplete="off" spellcheck="false" />',
         '      <div class="pokemon-picker-results" data-picker-results="1" data-book-path="' + encodedPath + '"></div>',
         '    </div>',
         '    <button class="btn" type="button" data-book-path="' + encodedPath + '" data-party-action="assign">Confirm</button>',
         '  </div>',
         '  <div class="party-actions">',
        '    <button class="btn secondary" type="button" data-book-path="' + encodedPath + '" data-party-action="clear">Clear</button>',
        '  </div>',
        '</div>'
      ].join("");
    }).join("");

    Array.from(partyGrid.querySelectorAll("[data-party-action='assign']")).forEach(function(button) {
      button.addEventListener("click", function() {
        assignPokemonToBook(decodeURIComponent(button.getAttribute("data-book-path") || ""));
      });
    });

    Array.from(partyGrid.querySelectorAll("[data-party-action='clear']")).forEach(function(button) {
      button.addEventListener("click", function() {
        clearAssignedPokemon(decodeURIComponent(button.getAttribute("data-book-path") || ""));
      });
    });

    Array.from(partyGrid.querySelectorAll("input[data-assign-input]")).forEach(function(input) {
      input.addEventListener("input", function() {
        delete input.dataset.selectedPokemonId;
        renderPickerResults(input);
      });
      input.addEventListener("focus", function() {
        renderPickerResults(input);
      });
      input.addEventListener("blur", function() {
        const encodedPath = input.getAttribute("data-book-path") || "";
        setTimeout(function() {
          closePickerResults(encodedPath);
        }, 120);
      });
      input.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          const matches = getPokemonMatches(input.value, 1);
          if (matches.length) {
            setPickerInputValue(input, matches[0]);
          }
          assignPokemonToBook(decodeURIComponent(input.getAttribute("data-book-path") || ""));
        }
      });
    });

    Array.from(partyGrid.querySelectorAll("[data-party-action='pick-pokemon']")).forEach(function(button) {
      button.addEventListener("click", function() {
        const encodedPath = button.getAttribute("data-book-path") || "";
        const input = partyGrid.querySelector('input[data-book-path="' + encodedPath + '"]');
        const pokemonId = parseInt(button.getAttribute("data-pokemon-id") || "", 10);
        const entry = getPokemonEntryById(pokemonId);
        if (!input || !entry) {
          return;
        }
        setPickerInputValue(input, entry);
        closePickerResults(encodedPath);
      });
    });

    syncButtons();
  }

  async function loadPartyBooks() {
    try {
      setStatus("Loading recent books...", false);
      const response = await fetch("/api/recent");
      if (!response.ok) {
        throw new Error("Recent books request failed (" + response.status + ")");
      }
      const books = await response.json();
      const recentBooks = Array.isArray(books) ? books.slice(0, 6) : [];
      const assignments = await Promise.all(recentBooks.map(function(book) {
        return fetchAssignedPokemon(book.path).catch(function(error) {
          console.error(error);
          return null;
        });
      }));
      partyBooks = recentBooks.map(function(book, index) {
        return Object.assign({}, book, { pokemon: assignments[index] });
      });
      renderParty();
      setStatus("Party ready. Recent books are ordered by recency and capped at 6 slots.", false);
    } catch (error) {
      console.error(error);
      partyBooks = [];
      partyGrid.innerHTML = "";
      setStatus("Could not load recent books: " + error.message, true);
    }
  }

  async function fetchPokemonBundleById(rawId) {
    const pokemon = await fetchJson("https://pokeapi.co/api/v2/pokemon/" + encodeURIComponent(String(rawId)));
    const species = await fetchJson(pokemon.species.url).catch(function() { return null; });
    const evolution = species && species.evolution_chain && species.evolution_chain.url
      ? await fetchJson(species.evolution_chain.url).catch(function() { return null; })
      : null;
    return { pokemon: pokemon, species: species, evolution: evolution };
  }

  async function assignPokemonToBook(path) {
    const encodedPath = encodeURIComponent(path);
    const input = partyGrid.querySelector('input[data-book-path="' + encodedPath + '"]');
    let selection = null;
    try {
      selection = resolvePokemonSelection(input);
    } catch (error) {
      setStatus(error.message, true);
      return;
    }

    const book = getBookByPath(path);
    try {
      busy = true;
      syncButtons();
      setStatus("Assigning " + selection.label + " to " + (book && book.title ? book.title : path) + "...", false);
      let payload = buildFallbackPokemonAssignment(selection);
      try {
        const bundle = await fetchPokemonBundleById(selection.id);
        payload = buildPokemonAssignmentPayload(bundle);
      } catch (fetchError) {
        console.error(fetchError);
      }
      const response = await fetch("/api/book-pokemon", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          path: path,
          pokemon: payload
        })
      });
      if (!response.ok) {
        throw new Error(await response.text());
      }
      await loadPartyBooks();
      setStatus("Assigned " + selection.label + " to " + (book && book.title ? book.title : path) + ".", false);
    } catch (error) {
      console.error(error);
      setStatus("Assign failed: " + error.message, true);
    } finally {
      busy = false;
      syncButtons();
    }
  }

  async function clearAssignedPokemon(path) {
    const book = getBookByPath(path);
    try {
      busy = true;
      syncButtons();
      setStatus("Removing Pokemon for " + (book && book.title ? book.title : path) + "...", false);
      const response = await fetch("/api/book-pokemon?path=" + encodeURIComponent(path), {
        method: "DELETE"
      });
      if (!response.ok) {
        throw new Error(await response.text());
      }
      await loadPartyBooks();
      setStatus("Pokemon removed from " + (book && book.title ? book.title : path) + ".", false);
    } catch (error) {
      console.error(error);
      setStatus("Delete failed: " + error.message, true);
    } finally {
      busy = false;
      syncButtons();
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    loadPartyBooks();
  });
</script>
</body>
</html>
